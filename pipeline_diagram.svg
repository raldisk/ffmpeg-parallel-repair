<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Mono', monospace">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#eab308"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="640" fill="#0d1117" rx="12"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TITLE -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="450" y="38" text-anchor="middle" font-size="15" font-weight="700" fill="#e6edf3" letter-spacing="0.5">MP4 Repair · Verify Pipeline</text>
  <line x1="60" y1="50" x2="840" y2="50" stroke="#21262d" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SECTION LABELS -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="230" y="74" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6e7681" letter-spacing="1.5">FIX_PARALLEL_MP4.PY</text>
  <text x="670" y="74" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6e7681" letter-spacing="1.5">VERIFY_FIXED.PY</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- INPUT BOX -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="60" y="84" width="130" height="56" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#79c0ff">INPUT</text>
  <text x="125" y="123" text-anchor="middle" font-size="10" fill="#8b949e">*.mp4  (cwd)</text>
  <text x="125" y="136" text-anchor="middle" font-size="9.5" fill="#6e7681">broken timestamps</text>

  <!-- Arrow: INPUT → PREFLIGHT -->
  <line x1="190" y1="112" x2="222" y2="112" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PREFLIGHT -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="222" y="90" width="118" height="44" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="281" y="109" text-anchor="middle" font-size="10.5" font-weight="600" fill="#e6edf3">_preflight()</text>
  <text x="281" y="125" text-anchor="middle" font-size="9.5" fill="#8b949e">ffmpeg / ffprobe</text>

  <!-- Arrow: PREFLIGHT → DETECT HW -->
  <line x1="340" y1="112" x2="370" y2="112" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- DETECT HW -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="370" y="90" width="118" height="44" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="429" y="109" text-anchor="middle" font-size="10.5" font-weight="600" fill="#e6edf3">detect_hwaccel()</text>
  <text x="429" y="125" text-anchor="middle" font-size="9.5" fill="#8b949e">NVENC → libx264</text>

  <!-- Arrow down from preflight section to worker pool -->
  <line x1="281" y1="134" x2="281" y2="162" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- WORKER POOL -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="178" y="162" width="205" height="36" rx="7" fill="#1c2128" stroke="#388bfd" stroke-width="1.5"/>
  <text x="281" y="176" text-anchor="middle" font-size="10.5" font-weight="600" fill="#388bfd">ThreadPoolExecutor</text>
  <text x="281" y="190" text-anchor="middle" font-size="9.5" fill="#8b949e">workers = min(N, cpu // 2)</text>

  <!-- Arrow down to three-step box -->
  <line x1="281" y1="198" x2="281" y2="224" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- 3-STEP REPAIR LADDER -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="110" y="224" width="340" height="220" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="280" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#6e7681" letter-spacing="1">REPAIR LADDER  (per file)</text>

  <!-- Step 1 -->
  <rect x="130" y="252" width="300" height="44" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="230" y="269" text-anchor="middle" font-size="10" font-weight="700" fill="#79c0ff">STEP 1</text>
  <text x="230" y="283" text-anchor="middle" font-size="9.5" fill="#8b949e">-fflags +genpts  -c copy  +faststart</text>
  <text x="360" y="269" text-anchor="middle" font-size="9.5" fill="#6e7681">lossless</text>
  <text x="360" y="283" text-anchor="middle" font-size="9" fill="#6e7681">regen timestamps</text>

  <!-- Arrow S1 → validate -->
  <line x1="280" y1="296" x2="280" y2="312" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- duration_valid? S1 -->
  <rect x="200" y="312" width="160" height="26" rx="5" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="280" y="329" text-anchor="middle" font-size="9.5" fill="#8b949e">duration_valid(orig, d)?</text>

  <!-- Yes arrow out right of S1 validate -->
  <line x1="360" y1="325" x2="420" y2="325" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="390" y="319" text-anchor="middle" font-size="9" fill="#22c55e">yes</text>

  <!-- No arrow down to S2 -->
  <line x1="280" y1="338" x2="280" y2="356" stroke="#ef4444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="293" y="351" font-size="9" fill="#ef4444">no</text>

  <!-- Step 2 -->
  <rect x="130" y="356" width="300" height="44" rx="6" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="230" y="373" text-anchor="middle" font-size="10" font-weight="700" fill="#79c0ff">STEP 2</text>
  <text x="230" y="387" text-anchor="middle" font-size="9.5" fill="#8b949e">-map 0  -c copy  -avoid_negative_ts</text>
  <text x="360" y="373" text-anchor="middle" font-size="9.5" fill="#6e7681">lossless</text>
  <text x="360" y="387" text-anchor="middle" font-size="9" fill="#6e7681">rebuild index</text>

  <!-- Arrow S2 → validate -->
  <line x1="280" y1="400" x2="280" y2="416" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- duration_valid? S2 -->
  <rect x="200" y="416" width="160" height="26" rx="5" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="280" y="433" text-anchor="middle" font-size="9.5" fill="#8b949e">duration_valid(orig, d)?</text>

  <!-- Yes arrow out right of S2 validate -->
  <line x1="360" y1="429" x2="420" y2="429" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="390" y="423" text-anchor="middle" font-size="9" fill="#22c55e">yes</text>

  <!-- No arrow down to S3 -->
  <line x1="280" y1="442" x2="280" y2="458" stroke="#ef4444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="293" y="453" font-size="9" fill="#ef4444">no</text>

  <!-- Step 3 -->
  <rect x="130" y="458" width="300" height="44" rx="6" fill="#0d1117" stroke="#f78166" stroke-width="1.5"/>
  <text x="230" y="475" text-anchor="middle" font-size="10" font-weight="700" fill="#f78166">STEP 3</text>
  <text x="230" y="489" text-anchor="middle" font-size="9.5" fill="#8b949e">libx264 / NVENC  -crf 18  -c:a copy</text>
  <text x="360" y="475" text-anchor="middle" font-size="9.5" fill="#6e7681">lossy</text>
  <text x="360" y="489" text-anchor="middle" font-size="9" fill="#6e7681">re-encode</text>

  <!-- Arrow S3 → right out -->
  <line x1="430" y1="480" x2="482" y2="480" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- fixed/ OUTPUT NODE -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Collect all green yes arrows into fixed/ -->
  <!-- Vertical spine from y=325, y=429, y=480 all land at x=482 → join at fixed/ -->
  <line x1="482" y1="325" x2="520" y2="325" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="482" y1="429" x2="520" y2="429" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="482" y1="480" x2="520" y2="480" stroke="#22c55e" stroke-width="1.5"/>
  <!-- vertical join -->
  <line x1="520" y1="325" x2="520" y2="480" stroke="#22c55e" stroke-width="1.5"/>
  <!-- horizontal to fixed/ box -->
  <line x1="520" y1="402" x2="546" y2="402" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="546" y="380" width="112" height="44" rx="7" fill="#161b22" stroke="#22c55e" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="602" y="397" text-anchor="middle" font-size="10.5" font-weight="700" fill="#22c55e">fixed/</text>
  <text x="602" y="413" text-anchor="middle" font-size="9.5" fill="#8b949e">*_fixed.mp4</text>

  <!-- Arrow fixed/ → verify -->
  <line x1="658" y1="402" x2="688" y2="402" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- VERIFY PIPELINE -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="688" y="224" width="155" height="310" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="765" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#6e7681" letter-spacing="1">4 CHECKS</text>

  <!-- Check 1 -->
  <rect x="703" y="252" width="125" height="38" rx="5" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="765" y="267" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e6edf3">① Container</text>
  <text x="765" y="281" text-anchor="middle" font-size="9" fill="#8b949e">ffprobe readable?</text>

  <!-- Check 2 -->
  <rect x="703" y="300" width="125" height="38" rx="5" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="765" y="315" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e6edf3">② Streams</text>
  <text x="765" y="329" text-anchor="middle" font-size="9" fill="#8b949e">video stream present?</text>

  <!-- Check 3 -->
  <rect x="703" y="348" width="125" height="48" rx="5" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="765" y="363" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e6edf3">③ Decode</text>
  <text x="765" y="377" text-anchor="middle" font-size="9" fill="#8b949e">ffmpeg -f null -</text>
  <text x="765" y="389" text-anchor="middle" font-size="9" fill="#6e7681">capture error lines</text>

  <!-- Check 4 -->
  <rect x="703" y="406" width="125" height="48" rx="5" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="765" y="421" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e6edf3">④ Duration</text>
  <text x="765" y="435" text-anchor="middle" font-size="9" fill="#8b949e">ratio ≥ 95% of source</text>
  <text x="765" y="447" text-anchor="middle" font-size="9" fill="#6e7681">dynamic threshold</text>

  <!-- Arrow between checks -->
  <line x1="765" y1="290" x2="765" y2="300" stroke="#3d444d" stroke-width="1"/>
  <line x1="765" y1="338" x2="765" y2="348" stroke="#3d444d" stroke-width="1"/>
  <line x1="765" y1="396" x2="765" y2="406" stroke="#3d444d" stroke-width="1"/>

  <!-- Arrow down to verdict -->
  <line x1="765" y1="454" x2="765" y2="474" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- VERDICT -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="700" y="474" width="130" height="36" rx="7" fill="#1c2128" stroke="#388bfd" stroke-width="1.5"/>
  <text x="765" y="488" text-anchor="middle" font-size="10" font-weight="700" fill="#e6edf3">VERDICT</text>
  <text x="765" y="502" text-anchor="middle" font-size="9.5" fill="#8b949e">PASS · WARN · FAIL</text>

  <!-- Verdict fan-out -->
  <line x1="765" y1="510" x2="765" y2="528" stroke="#6b7280" stroke-width="1.2"/>

  <!-- PASS -->
  <rect x="688" y="528" width="56" height="28" rx="5" fill="#0d1117" stroke="#22c55e" stroke-width="1.5"/>
  <text x="716" y="546" text-anchor="middle" font-size="10" font-weight="700" fill="#22c55e">✓ PASS</text>

  <!-- WARN -->
  <rect x="737" y="528" width="56" height="28" rx="5" fill="#0d1117" stroke="#eab308" stroke-width="1.5"/>
  <text x="765" y="546" text-anchor="middle" font-size="10" font-weight="700" fill="#eab308">⚠ WARN</text>

  <!-- FAIL -->
  <rect x="786" y="528" width="56" height="28" rx="5" fill="#0d1117" stroke="#ef4444" stroke-width="1.5"/>
  <text x="814" y="546" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">✗ FAIL</text>

  <!-- Fan lines -->
  <line x1="765" y1="528" x2="716" y2="528" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="765" y1="528" x2="814" y2="528" stroke="#ef4444" stroke-width="1.2"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- REPORT OUTPUT -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="700" y="578" width="130" height="34" rx="6" fill="#161b22" stroke="#3d444d" stroke-width="1.2"/>
  <text x="765" y="592" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e6edf3">verify_report.txt</text>
  <text x="765" y="606" text-anchor="middle" font-size="9" fill="#8b949e">full error lines · ratios</text>

  <!-- Arrow verdict → report -->
  <line x1="765" y1="556" x2="765" y2="578" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- EXIT CODE callout -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="60" y="578" width="200" height="34" rx="6" fill="#161b22" stroke="#3d444d" stroke-width="1"/>
  <text x="160" y="592" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e6edf3">exit 0  all PASS</text>
  <text x="160" y="606" text-anchor="middle" font-size="9" fill="#8b949e">exit 1  any WARN or FAIL  (--strict)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TEMP DIR callout -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="60" y="520" width="200" height="44" rx="6" fill="#161b22" stroke="#3d444d" stroke-width="1"/>
  <text x="160" y="536" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e6edf3">tempfile.mkdtemp()</text>
  <text x="160" y="550" text-anchor="middle" font-size="9" fill="#8b949e">isolated intermediates</text>
  <text x="160" y="562" text-anchor="middle" font-size="9" fill="#6e7681">cleaned up in finally{}</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- logs/ callout -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="60" y="460" width="200" height="44" rx="6" fill="#161b22" stroke="#3d444d" stroke-width="1"/>
  <text x="160" y="476" text-anchor="middle" font-size="9.5" font-weight="600" fill="#e6edf3">logs/</text>
  <text x="160" y="490" text-anchor="middle" font-size="9" fill="#8b949e">per-file ffmpeg output</text>
  <text x="160" y="503" text-anchor="middle" font-size="9" fill="#6e7681">ANSI-colored live stream</text>

  <!-- Divider between two scripts -->
  <line x1="660" y1="66" x2="660" y2="614" stroke="#21262d" stroke-width="1" stroke-dasharray="4 3"/>

</svg>
